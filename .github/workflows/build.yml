name: Build KTweak

on:
  push:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      CFLAGS: "-Oz -flto -ffunction-sections -fdata-sections -fno-unwind-tables -fno-asynchronous-unwind-tables -Wl,--gc-sections -s"

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Android NDK
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r26d

      - name: Build all profiles
        run: |
          mkdir -p build/armv7 build/armv8 build/x86 build/x86_64
          NDK=${{ steps.setup-ndk.outputs.ndk-path }}
          
          for arch in armv7 armv8 x86 x86_64; do
            case $arch in
              armv7)
                CLANG="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/armv7a-linux-androideabi21-clang"
                SUFFIX="_32"
                ;;
              armv8)
                CLANG="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang"
                SUFFIX="_64"
                ;;
              x86)
                CLANG="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/i686-linux-android21-clang"
                SUFFIX="_x86"
                ;;
              x86_64)
                CLANG="$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/x86_64-linux-android21-clang"
                SUFFIX="_x64"
                ;;
            esac
            
            for profile in budget latency throughput balance; do
              $CLANG $CFLAGS -o "build/$arch/ktweak_${profile}${SUFFIX}" "src/ktweak_${profile}.c"
              "$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/llvm-strip" --strip-all "build/$arch/ktweak_${profile}${SUFFIX}"
            done
          done

      - name: Prepare Magisk module
        run: |
          MODULE_DIR="KTweak"
          mkdir -p "$MODULE_DIR/system/bin"
          
          cp -r template/* "$MODULE_DIR/"
          
          for arch in armv7 armv8 x86 x86_64; do
            case $arch in
              armv7)  SUFFIX="_32" ;;
              armv8)  SUFFIX="_64" ;;
              x86)    SUFFIX="_x86" ;;
              x86_64) SUFFIX="_x64" ;;
            esac
            for profile in budget latency throughput balance; do
              cp "build/$arch/ktweak_${profile}${SUFFIX}" "$MODULE_DIR/system/bin/ktweak_${profile}${SUFFIX}"
            done
          done
          
          chmod 755 "$MODULE_DIR/system/bin/"*
          find "$MODULE_DIR" -type f -name "*.sh" -exec chmod 755 {} +
          
          cd "$MODULE_DIR" && zip -r9 "../KTweak.zip" . && cd ..

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: KTweak
          path: KTweak.zip