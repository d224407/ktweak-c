- name: Prepare Magisk module
  run: |
    MODULE_DIR="KTweak"
    mkdir -p "$MODULE_DIR/system/bin"
    
    cp -r template/* "$MODULE_DIR/"
    
    for arch in armv7 armv8 x86 x86_64; do
      case $arch in
        armv7)  SUFFIX="_32" ;;
        armv8)  SUFFIX="_64" ;;
        x86)    SUFFIX="_x86" ;;
        x86_64) SUFFIX="_x64" ;;
      esac
      for profile in budget latency throughput balance; do
        cp "build/$arch/ktweak_${profile}${SUFFIX}" "$MODULE_DIR/system/bin/ktweak_${profile}${SUFFIX}"
      done
    done
    
    chmod 755 "$MODULE_DIR/system/bin/"*
    find "$MODULE_DIR" -type f -name "*.sh" -exec chmod 755 {} +

- name: Upload artifact (folder)
  uses: actions/upload-artifact@v4
  with:
    name: KTweak
    path: KTweak/   # upload cả thư mục, không nén thành zip